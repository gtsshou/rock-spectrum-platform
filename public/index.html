<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岩石光谱库管理平台</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.0/echarts.min.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-gem"></i> 岩石光谱库
            </a>
            <div class="navbar-text ms-auto">
                <span class="badge bg-info" id="sample-count">加载中...</span>
                <span class="ms-3" id="user-info"></span>
                <button class="btn btn-sm btn-outline-light ms-2" id="login-btn" style="display: none;">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                <button class="btn btn-sm btn-outline-light ms-2" id="logout-btn" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i> 登出
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 左侧搜索栏 -->
            <div class="col-lg-3">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="fas fa-search"></i> 高级搜索</h5>
                    </div>
                    <div class="card-body">
                        <!-- 快速搜索 -->
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-filter"></i> 快速搜索</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="quick-search" 
                                       placeholder="输入具体岩性、位置或ID...">
                                <button class="btn btn-outline-primary" id="search-btn">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- 岩性筛选 -->
                        <div class="mb-3">
                            <label class="form-label">岩性类型</label>
                            <select class="form-select" id="rock-type-filter" multiple>
                            </select>
                            <small class="text-muted">可多选 (Ctrl+点击)</small>
                        </div>

                        <!-- 位置筛选 -->
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-map-marker-alt"></i> 采样位置</label>
                            <select class="form-select" id="location-filter">
                                <option value="">全部位置</option>
                            </select>
                        </div>

                        <!-- 波长范围 -->
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-wave-square"></i> 波长范围 (nm)</label>
                            <div class="row">
                                <div class="col">
                                    <input type="number" class="form-control" id="min-wave" 
                                           placeholder="最小值" min="350" max="2500">
                                </div>
                                <div class="col">
                                    <input type="number" class="form-control" id="max-wave" 
                                           placeholder="最大值" min="350" max="2500">
                                </div>
                            </div>
                        </div>

                        <!-- 搜索按钮 -->
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" id="apply-filter">
                                <i class="fas fa-check"></i> 应用筛选
                            </button>
                            <button class="btn btn-outline-secondary" id="reset-filter">
                                <i class="fas fa-redo"></i> 重置筛选
                            </button>
                        </div>

                        <!-- 统计数据 -->
                        <div class="mt-4">
                            <div class="card">
                                <div class="card-body py-2">
                                    <small>
                                        <i class="fas fa-info-circle"></i> 
                                        <span id="filter-stats">等待筛选...</span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 光谱对比 -->
                <div class="card shadow-sm mt-3">
                    <div class="card-header bg-success text-white">
                        <h6><i class="fas fa-exchange-alt"></i> 光谱对比</h6>
                    </div>
                    <div class="card-body">
                        <div id="compare-list">
                            <p class="text-muted small">点击样本的"对比"按钮添加</p>
                        </div>
                        <button class="btn btn-success btn-sm w-100 mt-2" id="compare-btn" disabled>
                            <i class="fas fa-chart-line"></i> 对比光谱
                        </button>
                        <button class="btn btn-outline-danger btn-sm w-100 mt-1" id="clear-compare">
                            <i class="fas fa-trash"></i> 清空对比
                        </button>
                    </div>
                </div>

                <!-- 管理员面板 -->
                <div class="card shadow-sm mt-3" id="admin-panel" style="display: none;">
                    <div class="card-header bg-danger text-white">
                        <h6><i class="fas fa-user-shield"></i> 管理员工具</h6>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-danger btn-sm w-100 mb-2" id="add-sample-btn">
                            <i class="fas fa-plus-circle"></i> 添加新样本
                        </button>
                        <div id="admin-actions" style="display: none;">
                            <!-- 动态显示编辑/删除按钮 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧内容区 -->
            <div class="col-lg-9">
                <!-- 光谱图表 -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white">
                        <h5><i class="fas fa-chart-line"></i> 光谱曲线</h5>
                    </div>
                    <div class="card-body">
                        <div id="spectrum-chart" style="height: 400px;"></div>
                        <div class="mt-3" id="chart-controls">
                            <button class="btn btn-sm btn-outline-primary" id="toggle-smooth">
                                <i class="fas fa-wave-square"></i> 平滑曲线
                            </button>
                            <button class="btn btn-sm btn-outline-primary" id="toggle-points">
                                <i class="fas fa-circle"></i> 显示数据点
                            </button>
                            <button class="btn btn-sm btn-outline-primary" id="download-chart">
                                <i class="fas fa-download"></i> 下载图表
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 样本展示 -->
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <div class="d-flex justify-content-between">
                            <h5><i class="fas fa-database"></i> 岩石样本库</h5>
                            <div>
                                <span class="badge bg-light text-dark me-2" id="result-count">0</span>
                                <button class="btn btn-sm btn-light" id="toggle-view">
                                    <i class="fas fa-th"></i> 网格视图
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- 列表视图 -->
                        <div id="list-view" style="display: none;">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>样本ID</th>
                                        <th>岩性</th>
                                        <th>位置</th>
                                        <th>时代</th>
                                        <th>光谱特征</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="rock-table">
                                </tbody>
                            </table>
                        </div>

                        <!-- 网格视图 -->
                        <div id="grid-view">
                            <div class="row" id="rock-grid">
                            </div>
                        </div>

                        <!-- 分页 -->
                        <nav class="mt-3" id="pagination-container">
                            <ul class="pagination justify-content-center">
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal fade" id="loginModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-lock"></i> 用户登录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" id="login-username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" id="login-password" required>
                        </div>
                        <div class="alert alert-info small">
                            <i class="fas fa-info-circle"></i> 测试账号：<br>
                            管理员: admin / admin123<br>
                            游客: guest / guest
                        </div>
                        <div id="login-error" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 样本编辑模态框 -->
    <div class="modal fade" id="sampleModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sampleModalTitle">添加新样本</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="sample-form" enctype="multipart/form-data">
                        <input type="hidden" id="sample-id" name="id">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">岩性类型 *</label>
                                    <select class="form-select" name="rock_type" required>
                                        <option value="">请选择</option>
                                        <option>侵入岩</option>
                                        <option>喷出岩</option>
                                        <option>碎屑岩</option>
                                        <option>粘土岩</option>
                                        <option>内源沉积岩</option>
                                        <option>区域变质岩</option>
                                        <option>接触变质岩</option>
                                        <option>混合岩</option>
                                        <option>动力变质岩</option>
                                        <option>热液交代变质岩</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">具体岩性</label>
                                    <input type="text" class="form-control" name="lithology">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">采样位置 *</label>
                                    <input type="text" class="form-control" name="location" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">坐标</label>
                                    <input type="text" class="form-control" name="coordinates" placeholder="经度,纬度">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">时代</label>
                                    <input type="text" class="form-control" name="formation_age">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">采集人</label>
                                    <input type="text" class="form-control" name="collector">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">采集日期</label>
                                    <input type="date" class="form-control" name="collection_date">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">矿物组成</label>
                                    <textarea class="form-control" name="mineral_composition" rows="2"></textarea>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="mb-3">
                                    <label class="form-label">描述</label>
                                    <textarea class="form-control" name="description" rows="2"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">岩石图片 *</label>
                                    <input type="file" class="form-control" name="image" accept="image/jpeg,image/png,image/jpg" id="image-input">
                                    <div id="image-preview" class="mt-2"></div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">光谱CSV文件 *</label>
                                    <input type="file" class="form-control" name="spectrum" accept=".csv" id="spectrum-input">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="save-sample-btn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 样本详情模态框 -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">样本详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-body">
                </div>
                <div class="modal-footer">
                    <div id="detail-admin-actions" style="display: none;">
                        <button class="btn btn-warning" id="detail-edit-btn">编辑</button>
                        <button class="btn btn-danger" id="detail-delete-btn">删除</button>
                    </div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-5 py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">岩石光谱库管理平台 © 2026 | 数据仅供科研使用</span>
        </div>
    </footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.staticfile.org/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/chart.js"></script>
    <script src="/js/search.js"></script>
</body>
</html>
